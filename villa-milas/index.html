<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Villa Milas Mostar | Book Your Stay</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    
</head>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
<body>
    <!-- Header -->
    <header>
        <div class="container">
            <div class="header-content">
                <a href="#" class="logo">Villa <span>Milas</span></a>
                <nav>
                    <ul>
                        <li><a href="#about">About</a></li>
                        <li><a href="#rooms">Rooms</a></li>
                        <li><a href="#amenities">Amenities</a></li>
                        <li><a href="#location">Location</a></li>
                        <li><a href="#contact">Contact</a></li>
                    </ul>
                </nav>
                <button class="book-btn" onclick="scrollToBooking()">Book Now</button>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Hotel Villa Milas</h1>
            <p>Experience authentic Bosnian hospitality in the heart of Mostar, just steps from the UNESCO-listed Old Bridge</p>
            <div class="rating-badge">
                <span>★</span> 9.2/10 Wonderful · 2,470 reviews
            </div>
        </div>
    </section>

    <!-- Booking Section -->
    <div class="container">
        <div class="booking-bar" id="booking">
            <form class="booking-form" id="bookingForm">
                <div class="form-group">
                    <label>Check-in</label>
                    <input type="date" id="checkin" required>
                </div>
                <div class="form-group">
                    <label>Check-out</label>
                    <input type="date" id="checkout" required>
                </div>
                <div class="form-group">
                    <label>Adults</label>
                    <select id="adults">
                        <option value="1">1 Adult</option>
                        <option value="2" selected>2 Adults</option>
                        <option value="3">3 Adults</option>
                        <option value="4">4 Adults</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Children</label>
                    <select id="children">
                        <option value="0" selected>No Children</option>
                        <option value="1">1 Child</option>
                        <option value="2">2 Children</option>
                        <option value="3">3 Children</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Room Type</label>
                    <select id="roomType">
                        <option value="double">Double Room</option>
                        <option value="twin">Twin Room</option>
                        <option value="triple">Triple Room</option>
                        <option value="quadruple">Quadruple Room</option>
                    </select>
                </div>
                <button type="submit">Check Availability</button>
            </form>
        </div>
    </div>

    <!-- Sections: About, Rooms, Amenities, Gallery, Location, Contact -->
    <!-- ...keep the content from your previous HTML, unchanged... -->

    <!-- Booking Modal -->
    <div class="modal" id="bookingModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <h3>Confirm Your Booking</h3>
            <p id="roomTypeDisplay">Double Room</p>
            <div class="booking-summary">
                <!-- Summary details here -->
            </div>
            <form id="bookingDetailsForm">
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email Address" required>
                <input type="tel" placeholder="Phone Number" required>
                <button type="submit">Confirm Booking</button>
            </form>
        </div>
    </div>

    <!-- JS -->
    <script src="script.js"></script>
</body>
</html>
